services:
  - type: web                         # Web service = free tier eligible
    name: confession-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python confession_bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: GROUP_CHAT_ID
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
